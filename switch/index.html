        function operacaoMat(){
            operacao = parseInt(document.getElementById("codigo").value);

            switch (operacao) {
                case 1: 
                    let n1 = parseInt(document.getElementById("n1").value);
                    let quadrado = Math.sqrt(n1);
                    document.getElementById("resultado").innerHTML = "O resultado é " + quadrado;
                    
                    break;
                case 2:
                    let base = parseInt(document.getElementById("n1").value);
                    let expoente = parseInt(document.getElementById("n2").value);
                    let poten = base**expoente;
                    document.getElementById("resultado").innerHTML = "O resultado da exponenciação é " + poten;
                    break;
                case 3:
                    let a = parseInt(document.getElementById("n1").value);
                    let b = parseInt(document.getElementById("n2").value);
                    let resultado = (a**2)+Math.sqrt(a+b);
                    document.getElementById("resultado").innerHTML = "O resultado é " + resultado;
                    
                    break;
                default:
                    alert("Código inválido.");
                    break;
            }
        }
    </script>

<body>
    <h1>Escolha uma opção de operação matemática:</h1>
    <table border="1">
        <tr>
            <th>Cod</th>

        </tr>

        </tr>
        <tr>
            <td>3</td>
            <td>a²+√(a+b)</td>
        </tr>
    </table>
    <br>
    <label for="codigo">Cod:</label>
    <input type="text" id="codigo">
    <button onclick="operacaoMatVisibilidade()"> Selecionar </button>
    <br>
    <br>
    <label for="n1" id="labelN1">Digite o primeiro valor:</label>
    <input type="text" id="n1">
    <br>
    <label for="n2" id="labelN2">Digite o primeiro valor:</label>
    <input type="text" id="n2">
    <br>
    <button id="calcular" onclick="operacaoMat()">Calcular</button>
    <p id="resultado"></p>
    <script>
        document.getElementById("labelN1").style.display = "none";
        document.getElementById("n1").style.display = "none";
        document.getElementById("labelN2").style.display = "none";
        document.getElementById("n2").style.display = "none";
        document.getElementById("calcular").style.display = "none";
        
    </script>
