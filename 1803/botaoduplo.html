<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function modificaEstado(param) {
            document.getElementById("texto").style.display = param;
        }
    </script>
</head>
<body>
    <h1 id="texto">teste</h1>
    <button onclick="modificaEstado('none')">sumir</button>
    <button onclick="modificaEstado('')">aparecer</button>
</body>
</html>
